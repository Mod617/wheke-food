<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login Livreur</title>

<style>
body{
    font-family:Segoe UI;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:#25D366;
    color:white;
    border:none;
}
</style>
</head>

<body>

<form method="POST">
<h3>🚴 Connexion Livreur</h3>

<input type="text" name="telephone" placeholder="Téléphone" required>
<input type="password" name="password" placeholder="Mot de passe" required>

<button type="submit">Se connecter</button>

</form>

</body>
</html>

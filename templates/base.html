<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    h1 {
        text-align: center;
        background: #ff6600;
        color: white;
        padding: 15px;
    }

    .section {
        padding: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
</style>
```

</head>
<body>

<h1>🍔 Wheke Food</h1>

<div class="section">
    <h2>Repas</h2>
    {% for m in repas %}
        <div class="card">
            <b>{{ m.nom }}</b><br>
            {{ m.prix }} FCFA<br>
            {{ m.disponibilite }}
        </div>
    {% endfor %}
</div>

<div class="section">
    <h2>Desserts</h2>
    {% for m in desserts %}
        <div class="card">
            <b>{{ m.nom }}</b>
        </div>
    {% endfor %}
</div>

<div class="section">
    <h2>Jus</h2>
    {% for m in jus %}
        <div class="card">
            <b>{{ m.nom }}</b>
        </div>
    {% endfor %}
</div>

</body>
</html>
